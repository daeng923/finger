<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Fingerprint UMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .umm-gradient { background: linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 h-20 flex items-center px-6 justify-between">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 umm-gradient rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-red-200">A</div>
            <h1 class="font-extrabold text-slate-800 uppercase text-sm tracking-tight">Panel Otoritas Petugas</h1>
        </div>
        <button onclick="refreshData()" class="p-3 bg-slate-100 rounded-xl hover:bg-slate-200 transition-all text-slate-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round"></path></svg></button>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div class="mb-8 flex justify-between items-center">
            <span class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Antrean Menunggu (FIFO)</span>
            <span id="count-badge" class="bg-red-100 text-red-700 text-[10px] px-4 py-1.5 rounded-full font-black uppercase">0 Mahasiswa</span>
        </div>
        <div id="admin-list" class="space-y-4"></div>
        <div id="admin-empty" class="hidden py-40 text-center animate__animated animate__fadeIn text-slate-300 font-black uppercase text-[10px] italic tracking-[0.4em]">Tidak Ada Antrean</div>
    </main>

    <script>
        const API_URL = "URL_GOOGLE_APPS_SCRIPT_ANDA";

        async function refreshData() {
            try {
                const res = await fetch(`${API_URL}?action=list`);
                const data = await res.json();
                const pending = data.filter(i => !i.isVerified).sort((a, b) => parseInt(a.id) - parseInt(b.id));
                
                document.getElementById('count-badge').innerText = `${pending.length} Mahasiswa`;
                document.getElementById('admin-empty').classList.toggle('hidden', pending.length > 0);
                document.getElementById('admin-list').innerHTML = pending.map(item => `
                    <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 p-8 flex flex-col md:flex-row items-center justify-between gap-6 animate__animated animate__fadeInUp">
                        <div class="flex items-center gap-8 w-full md:w-auto">
                            <div class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center text-white text-2xl font-black font-mono shadow-xl">${item.id}</div>
                            <div>
                                <div class="text-2xl font-black text-slate-800 tracking-tighter">${item.nim}</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">${item.nama || 'Peserta AIK'} • ${item.time}</div>
                            </div>
                        </div>
                        <button onclick="confirmVer('${item.nim}', this)" class="w-full md:w-auto umm-gradient text-white px-10 py-5 rounded-2xl font-black text-xs uppercase shadow-lg hover:opacity-90 active:scale-95 transition-all">Konfirmasi Selesai</button>
                    </div>`).join('');
            } catch (e) {}
        }

        async function confirmVer(nim, btn) {
            if(!confirm(`Konfirmasi NIM ${nim} telah selesai rekam?`)) return;
            btn.innerText = "PROSES..."; btn.disabled = true;
            try {
                const res = await fetch(`${API_URL}?action=verify&nim=${nim}`);
                const data = await res.json();
                if(data.success) { refreshData(); } else { alert(data.error); btn.innerText = "GAGAL"; btn.disabled = false; }
            } catch(e) { alert("Koneksi Error"); btn.disabled = false; }
        }

        window.onload = () => { refreshData(); setInterval(refreshData, 5000); };
    </script>
</body>
</html>
