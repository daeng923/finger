<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Fingerprint - UMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .umm-gradient { background: linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%); }
        .btn-call { background: #f59e0b; } /* Amber untuk panggil */
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzOCnpPS2pI4ObD3Oh_8IJMdFVIdvNlegmeWB22aVYKRQxbjSv4kGjLp9H3ma5ThL5SEA/exec";
    </script>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 h-20 flex items-center px-6 justify-between">
        <h1 class="font-extrabold text-slate-800 uppercase italic">Panel Otoritas Petugas</h1>
        <div class="flex items-center gap-3">
             <button onclick="refreshData()" class="p-3 bg-slate-100 rounded-xl hover:bg-slate-200">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2"></path></svg>
            </button>
        </div>
    </header>

    <main class="max-w-[1000px] mx-auto p-6">
        <div id="admin-list" class="space-y-4"></div>
        <div id="admin-empty" class="hidden py-48 text-center text-slate-300 font-black uppercase text-xs italic tracking-[0.4em]">Semua Antrean Selesai</div>
    </main>

    <script>
        window.onload = () => { refreshData(); setInterval(refreshData, 5000); };

        async function refreshData() {
            try {
                const response = await fetch(`${API_URL}?action=list`);
                const data = await response.json();
                const list = document.getElementById('admin-list');
                const pending = data.registrations.filter(i => !i.isVerified);
                
                document.getElementById('admin-empty').classList.toggle('hidden', pending.length > 0);
                list.innerHTML = pending.map(item => `
                    <div class="bg-white rounded-[2rem] shadow-lg border border-slate-100 p-8 flex items-center justify-between animate__animated animate__fadeInUp">
                        <div class="flex items-center gap-8">
                            <div class="w-20 h-20 bg-slate-900 rounded-3xl flex items-center justify-center text-white text-3xl font-black font-mono shadow-xl">${item.id}</div>
                            <div>
                                <div class="text-3xl font-black text-slate-800 tracking-tight">${item.nim}</div>
                                <div class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mt-1">${item.nama || 'Peserta'} • ${item.time}</div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="callUser('${item.nim}')" class="btn-call text-white px-6 py-5 rounded-2xl font-black text-xs uppercase shadow-xl hover:opacity-90 active:scale-95 transition-all">
                                📢 Panggil
                            </button>
                            <button onclick="confirmRec('${item.nim}')" class="umm-gradient text-white px-8 py-5 rounded-2xl font-black text-xs uppercase shadow-xl hover:opacity-90 active:scale-95 transition-all">
                                Konfirmasi
                            </button>
                        </div>
                    </div>`).join('');
            } catch(e) {}
        }

        async function callUser(nim) {
            try {
                await fetch(`${API_URL}?action=call&nim=${nim}`);
            } catch(e) {
                alert("Gagal memicu panggilan suara.");
            }
        }

        async function confirmRec(nim) {
            if(!confirm(`Konfirmasi NIM ${nim} telah merekam jari?`)) return;
            await fetch(`${API_URL}?action=verify&nim=${nim}`);
            refreshData();
        }
    </script>
</body>
</html>
