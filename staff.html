<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Otoritas Petugas - AIK & MKWK UMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .umm-gradient { background: linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <script>
        // Link Google Apps Script sebagai API Backend
        const API_URL = "https://script.google.com/macros/s/AKfycbw3ELFkRdWCcXhIcHvTDho59awwh1UGn4EXJ0OZBLETRyOXgMNVaQYAzjmx4oFeSEu2iA/exec";
    </script>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-[1000px] mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 umm-gradient rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-red-200">UMM</div>
                <div>
                    <h1 class="font-extrabold text-slate-800 text-lg uppercase tracking-tight italic leading-none">Panel Otoritas</h1>
                    <p class="text-slate-500 text-[10px] font-bold uppercase mt-1">AIK & MKWK Univ. Muhammadiyah Malang</p>
                </div>
            </div>
            <button onclick="refreshData()" class="p-3 bg-slate-100 hover:bg-slate-200 rounded-2xl transition-all">
                <svg id="refresh-icon" class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round"></path></svg>
            </button>
        </div>
    </header>

    <main class="max-w-[1000px] mx-auto p-6">
        <div class="mb-6 flex justify-between items-center px-4">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Daftar Tunggu (Urutan ID Terkecil ke Terbesar)</span>
            <span id="queue-count" class="bg-red-100 text-red-700 text-[10px] px-3 py-1 rounded-full font-black uppercase">0 Mahasiswa</span>
        </div>

        <div id="admin-list" class="space-y-4">
            <!-- Items injected here -->
        </div>

        <div id="admin-empty" class="hidden py-48 text-center animate__animated animate__fadeIn">
            <div class="bg-white w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm border border-slate-100">
                <svg class="w-12 h-12 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </div>
            <p class="text-slate-300 font-black uppercase tracking-[0.4em] text-xs italic">Semua Antrean Selesai</p>
        </div>
    </main>

    <script>
        window.onload = () => { refreshData(); setInterval(refreshData, 5000); };

        async function refreshData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin');
            
            try {
                const response = await fetch(`${API_URL}?action=list`);
                const data = await response.json();
                const list = document.getElementById('admin-list');
                
                // 1. Filter hanya yang belum diverifikasi
                // 2. Sortir secara numerik berdasarkan ID (ID Rendah ke ID Tinggi)
                const pending = data
                    .filter(i => !i.isVerified)
                    .sort((a, b) => parseInt(a.id) - parseInt(b.id));
                
                document.getElementById('admin-empty').classList.toggle('hidden', pending.length > 0);
                document.getElementById('queue-count').innerText = `${pending.length} Mahasiswa`;
                
                list.innerHTML = pending.map((item, index) => `
                    <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 p-8 flex items-center justify-between hover:shadow-2xl transition-all animate__animated animate__fadeInUp" style="animation-delay: ${index * 100}ms">
                        <div class="flex items-center gap-8">
                            <div class="w-20 h-20 bg-slate-900 rounded-3xl flex items-center justify-center text-white shadow-xl">
                                <span class="text-3xl font-black font-mono leading-none">${item.id}</span>
                            </div>
                            <div>
                                <div class="text-3xl font-black text-slate-800 tracking-tight">${item.nim}</div>
                                <div class="flex items-center gap-3 mt-1">
                                    <span class="text-[11px] font-bold text-slate-400 uppercase tracking-widest italic">Masuk: ${item.time}</span>
                                    <div class="w-1.5 h-1.5 bg-red-600 rounded-full animate-pulse"></div>
                                    <span class="text-[11px] font-black text-red-600 uppercase tracking-tighter">Proses ID #${item.id}</span>
                                </div>
                            </div>
                        </div>
                        <button onclick="confirmRec('${item.nim}', '${item.id}')" class="umm-gradient hover:opacity-90 text-white px-12 py-5 rounded-[1.5rem] font-black text-xs uppercase tracking-widest shadow-xl shadow-red-100 active:scale-95 transition-all flex items-center gap-3">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round"></path></svg>
                            Konfirmasi
                        </button>
                    </div>
                `).join('');
            } catch (e) { console.error(e); } finally { setTimeout(() => icon.classList.remove('animate-spin'), 500); }
        }

        async function confirmRec(nim, id) {
            if(!confirm(`Konfirmasi NIM ${nim} (ID ${id}) telah merekam sidik jari?`)) return;
            try {
                const response = await fetch(`${API_URL}?action=verify&nim=${nim}`);
                const res = await response.json();
                if(res.success) refreshData();
            } catch (e) { alert("Gagal verifikasi. Periksa internet."); }
        }
    </script>
</body>
</html>
