<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Fingerprint - UMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; }
        .umm-gradient { background: linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%); }
        .calling-row { background: #fffbeb; border-left: 8px solid #f59e0b; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 h-20 flex items-center px-6 justify-between">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 umm-gradient rounded-xl flex items-center justify-center text-white font-black">UMM</div>
            <h1 class="font-extrabold text-slate-800 uppercase text-sm">Scanner Terminal</h1>
        </div>
        <div class="flex items-center gap-3">
            <!-- WAJIB DIKLIK AGAR SUARA AKTIF -->
            <button id="voiceBtn" onclick="initVoice()" class="flex items-center gap-2 px-6 py-3 bg-slate-100 text-slate-600 rounded-2xl text-xs font-black uppercase transition-all">
                <span id="vIcon">🔇</span> <span id="vText">Aktifkan Suara</span>
            </button>
            <div id="qLabel" class="hidden flex items-center gap-2 px-4 py-2 bg-amber-50 text-amber-600 rounded-full text-[10px] font-black uppercase border border-amber-100">
                <span class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span> Panggilan: <span id="qNim" class="text-slate-900 ml-1">---</span>
            </div>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4">
            <div class="bg-white rounded-[2.5rem] shadow-xl p-8 border border-slate-100 sticky top-28">
                <input type="text" id="nimInput" maxlength="15" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl text-center text-4xl font-black text-slate-700 focus:border-red-600 outline-none" placeholder="----">
                <p class="text-center text-[10px] font-bold text-slate-400 mt-4 uppercase tracking-widest">Input NIM Untuk Antrean</p>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase border-b">
                        <tr>
                            <th class="px-8 py-6 text-center">ID</th>
                            <th class="px-8 py-6">NIM Mahasiswa</th>
                            <th class="px-8 py-6">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- LOG DEBUG UNTUK ADMIN -->
    <div id="debugLog" class="fixed bottom-4 right-4 text-[9px] bg-black/80 text-white p-2 rounded-lg font-mono opacity-50">Sistem Siap...</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxiuQXcJvrw9vE2FutImOIP6ysmsOsDK5O3zko_wBDtQfp7OPCI9OzF45o1lriW4WfRPA/exec";
        let isVoiceReady = false;
        let lastCallTime = 0;

        function initVoice() {
            isVoiceReady = true;
            document.getElementById('voiceBtn').className = "flex items-center gap-2 px-6 py-3 bg-red-600 text-white rounded-2xl text-xs font-black uppercase shadow-lg";
            document.getElementById('vIcon').innerText = "🔊";
            document.getElementById('vText').innerText = "Suara Aktif";
            speak("Sistem suara aktif");
        }

        function speak(text) {
            if (!isVoiceReady) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        async function updateData() {
            try {
                const res = await fetch(`${API_URL}?action=list`);
                const data = await responseJson = await res.json();
                
                const registrations = data.registrations || [];
                const lastCall = data.lastCall || { nim: "", time: "0" };

                // Deteksi Panggilan Manual
                const serverTime = Number(lastCall.time);
                if (serverTime > lastCallTime && lastCall.nim !== "") {
                    lastCallTime = serverTime;
                    document.getElementById('debugLog').innerText = "Sinyal Panggilan Diterima: " + lastCall.nim;
                    speak(`Nomor Induk Mahasiswa ${lastCall.nim.split('').join(' ')}, silakan menuju meja mesin.`);
                }

                if (lastCall.nim) {
                    document.getElementById('qLabel').classList.remove('hidden');
                    document.getElementById('qNim').innerText = lastCall.nim;
                }

                document.getElementById('tableBody').innerHTML = registrations.map(item => {
                    const isCalled = item.nim === lastCall.nim && !item.isVerified;
                    return `
                    <tr class="${isCalled ? 'calling-row animate__animated animate__pulse animate__infinite' : ''}">
                        <td class="px-8 py-6 text-center"><span class="bg-slate-900 text-white px-4 py-2 rounded-xl font-black">${item.id}</span></td>
                        <td class="px-8 py-6 font-black text-lg">${item.nim}</td>
                        <td class="px-8 py-6">
                            <span class="text-[10px] font-black uppercase ${item.isVerified ? 'text-emerald-600' : 'text-amber-600'}">
                                ${item.isVerified ? '✓ Selesai' : (isCalled ? '📢 Dipanggil' : '⌛ Antre')}
                            </span>
                        </td>
                    </tr>`;
                }).join('');
            } catch (e) {
                console.error(e);
            }
        }

        window.onload = () => { setInterval(updateData, 3000); updateData(); };
    </script>
</body>
</html>
