<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Fingerprint - UMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            user-select: none;
            -webkit-user-select: none;
        }
        .umm-gradient { background: linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%); }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        .calling-row { background: #fefce8; border-left: 6px solid #eab308; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- MODAL ERROR / NOTIFIKASI -->
    <div id="statusModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 modal-overlay animate__animated animate__fadeIn">
        <div class="bg-white rounded-[2.5rem] shadow-2xl max-w-sm w-full p-10 text-center animate__animated animate__zoomIn">
            <div id="modalIcon" class="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6"></div>
            <h3 id="modalTitle" class="text-xl font-black text-slate-800 mb-2 uppercase tracking-tighter">Status</h3>
            <p id="modalText" class="text-slate-500 text-sm leading-relaxed mb-8"></p>
            <button onclick="closeModal()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-slate-800 transition-all">Tutup</button>
        </div>
    </div>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 h-20 flex items-center px-6 justify-between">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 umm-gradient rounded-xl flex items-center justify-center text-white font-black shadow-lg">UMM</div>
            <div>
                <h1 class="font-extrabold text-slate-800 uppercase text-sm leading-none">Scanner Terminal</h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Meja Pendaftaran Lantai 2</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <!-- Tombol Aktifkan Suara (Wajib untuk Chrome Policy) -->
            <button id="voiceToggle" onclick="enableVoice()" class="flex items-center gap-2 px-4 py-2 bg-slate-100 text-slate-600 rounded-full text-[10px] font-black uppercase tracking-tighter hover:bg-red-50 hover:text-red-600 transition-all">
                <span id="voiceIcon">🔇</span> <span id="voiceText">Suara Mati</span>
            </button>
            <div id="queue-status" class="hidden md:flex items-center gap-2 px-4 py-2 bg-amber-50 text-amber-600 rounded-full text-[10px] font-black uppercase tracking-tighter border border-amber-100">
                <span class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span> Giliran: <span id="current-call-nim" class="ml-1 text-slate-900 font-bold">---</span>
            </div>
            <div class="flex items-center gap-2 px-4 py-2 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase tracking-tighter">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span> Online
            </div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 lg:sticky lg:top-28">
            <div class="bg-white rounded-[2.5rem] shadow-xl p-8 border border-slate-100">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-black text-slate-800 tracking-tight">Pendaftaran</h2>
                    <p class="text-slate-400 text-[10px] font-black uppercase mt-1">Input NIM Mahasiswa (15 Digit)</p>
                </div>

                <div class="relative">
                    <input type="text" id="nimInput" maxlength="15" oninput="this.value = this.value.replace(/[^0-9]/g, '')" autocomplete="off" class="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl text-center text-4xl font-black text-slate-700 focus:border-red-600 transition-all outline-none" placeholder="----">
                    <div id="scan-loading" class="hidden absolute right-6 top-1/2 -translate-y-1/2">
                        <div class="animate-spin rounded-full h-8 w-8 border-4 border-slate-200 border-b-red-600"></div>
                    </div>
                </div>

                <div id="fast-feedback" class="hidden mt-8 animate__animated animate__zoomIn text-center">
                    <div id="fb-card" class="rounded-[2rem] p-8 shadow-2xl text-white mb-6">
                        <span id="fb-status" class="text-[10px] font-black uppercase tracking-widest block mb-2 opacity-80"></span>
                        <div id="fb-id" class="text-7xl font-black font-mono leading-none tracking-tighter mb-4">---</div>
                        <div class="text-[9px] font-bold px-5 py-2.5 bg-black/10 rounded-2xl inline-block italic uppercase tracking-tighter">Silakan Ke Meja Mesin</div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-3xl border border-slate-200 flex flex-col items-center gap-2 overflow-hidden">
                        <img id="qr-result" class="w-40 h-40 rounded-xl shadow-sm bg-white" src="" alt="QR">
                        <p class="text-[9px] font-extrabold text-slate-400 uppercase tracking-tighter mt-2">PINDAI QR CEK STATUS</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
                <div class="p-8 bg-slate-900 text-white flex justify-between items-center">
                    <h2 class="text-xl font-bold uppercase tracking-tight">Monitor Antrean</h2>
                    <span class="text-[10px] font-black bg-white/10 px-4 py-2 rounded-full uppercase">Update: <span id="last-update">--:--</span></span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b">
                            <tr>
                                <th class="px-8 py-6 text-center">ID Finger</th>
                                <th class="px-8 py-6">NIM Mahasiswa</th>
                                <th class="px-8 py-6">Waktu</th>
                                <th class="px-8 py-6">Informasi</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body" class="divide-y divide-slate-100 text-slate-700"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzOCnpPS2pI4ObD3Oh_8IJMdFVIdvNlegmeWB22aVYKRQxbjSv4kGjLp9H3ma5ThL5SEA/exec";
        const nimInput = document.getElementById('nimInput');
        
        let isVoiceEnabled = false;
        let lastCalledNim = null;

        // Security
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 67, 74].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false; };

        window.onload = () => { 
            nimInput.focus(); 
            refreshData(); 
            setInterval(refreshData, 5000); 
        };
        
        document.addEventListener('click', () => { if(!nimInput.disabled) nimInput.focus(); });

        function enableVoice() {
            isVoiceEnabled = !isVoiceEnabled;
            const btn = document.getElementById('voiceToggle');
            const icon = document.getElementById('voiceIcon');
            const text = document.getElementById('voiceText');
            
            if(isVoiceEnabled) {
                btn.className = "flex items-center gap-2 px-4 py-2 bg-red-600 text-white rounded-full text-[10px] font-black uppercase tracking-tighter shadow-lg transition-all";
                icon.innerText = "🔊";
                text.innerText = "Suara Aktif";
                // Test sound
                panggilNIM("Suara aktif");
            } else {
                btn.className = "flex items-center gap-2 px-4 py-2 bg-slate-100 text-slate-600 rounded-full text-[10px] font-black uppercase tracking-tighter hover:bg-red-50 hover:text-red-600 transition-all";
                icon.innerText = "🔇";
                text.innerText = "Suara Mati";
            }
        }

        function panggilNIM(teks) {
            if (!isVoiceEnabled) return;
            const synth = window.speechSynthesis;
            const utterThis = new SpeechSynthesisUtterance(teks);
            utterThis.lang = 'id-ID';
            utterThis.rate = 0.9;
            utterThis.pitch = 1.1;
            synth.speak(utterThis);
        }

        nimInput.onkeypress = async (e) => {
            if (e.key === 'Enter') {
                const nim = nimInput.value.trim();
                if (nim.length !== 15) {
                    showModal("NIM Tidak Valid", "NIM harus berjumlah tepat 15 digit angka.", "red");
                    return;
                }
                nimInput.disabled = true;
                document.getElementById('scan-loading').classList.remove('hidden');
                try {
                    const response = await fetch(`${API_URL}?action=scan&nim=${nim}`);
                    const res = await response.json();
                    document.getElementById('scan-loading').classList.add('hidden');
                    if(res.error) {
                        showModal("Error", res.error, "red");
                        resetScanner();
                    } else {
                        handleScanSuccess(res);
                        refreshData();
                    }
                } catch(e) {
                    showModal("Koneksi Gagal", "Pastikan internet stabil.", "red");
                    resetScanner();
                }
            }
        };

        function handleScanSuccess(res) {
            const feedback = document.getElementById('fast-feedback');
            document.getElementById('fb-id').innerText = res.idFinger;
            document.getElementById('fb-status').innerText = res.exists ? "DATA TERDAFTAR" : "REGISTRASI BERHASIL";
            document.getElementById('fb-card').className = `rounded-[2rem] p-8 shadow-2xl text-white ${res.exists ? 'bg-amber-500' : 'bg-emerald-600'}`;
            document.getElementById('qr-result').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent("https://daeng923.github.io/finger/search.html")}`;
            feedback.classList.remove('hidden');
            setTimeout(resetScanner, 5000);
        }

        function resetScanner() {
            nimInput.value = ''; nimInput.disabled = false;
            document.getElementById('fast-feedback').classList.add('hidden');
            nimInput.focus();
        }

        async function refreshData() {
            try {
                const response = await fetch(`${API_URL}?action=list`);
                const data = await response.json();
                const tbody = document.getElementById('user-table-body');
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
                
                const pendingList = data.filter(i => !i.isVerified).sort((a,b) => parseInt(a.id) - parseInt(b.id));
                const currentlyCalledNIM = pendingList.length > 0 ? pendingList[0].nim : null;
                
                // Logika Panggilan Suara
                if(currentlyCalledNIM && currentlyCalledNIM !== lastCalledNim) {
                    lastCalledNim = currentlyCalledNIM;
                    panggilNIM(`Panggilan untuk N I M ${currentlyCalledNIM.split('').join(' ')}, silakan menuju meja mesin.`);
                }

                if(currentlyCalledNIM) {
                    document.getElementById('queue-status').classList.remove('hidden');
                    document.getElementById('current-call-nim').innerText = currentlyCalledNIM;
                } else {
                    document.getElementById('queue-status').classList.add('hidden');
                }

                tbody.innerHTML = data.map(item => {
                    const isBeingCalled = item.nim === currentlyCalledNIM;
                    const rowClass = isBeingCalled ? 'calling-row animate__animated animate__pulse animate__infinite' : '';
                    
                    return `
                    <tr class="transition-all ${rowClass}">
                        <td class="px-8 py-6 text-center">
                            <span class="bg-slate-900 text-white px-5 py-2 rounded-2xl font-mono font-black text-xl shadow-lg">${item.id}</span>
                        </td>
                        <td class="px-8 py-6">
                            <div class="font-black text-slate-800 text-lg">${item.nim}</div>
                            <div class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">${item.nama || 'Mahasiswa'}</div>
                        </td>
                        <td class="px-8 py-6 text-slate-400 font-bold text-[10px] uppercase">${item.time}</td>
                        <td class="px-8 py-6">
                            ${isBeingCalled ? 
                                '<span class="flex items-center gap-1.5 px-4 py-2 bg-amber-500 text-white rounded-xl text-[10px] font-black uppercase shadow-md">📢 DIPANGGIL</span>' : 
                                `<span class="px-4 py-2 rounded-xl text-[10px] font-black uppercase border ${item.isVerified ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-slate-100 text-slate-400 border-slate-200'}">${item.isVerified ? '✓ Selesai' : '⌛ Antre'}</span>`
                            }
                        </td>
                    </tr>`;
                }).join('');
            } catch(e) {}
        }

        function showModal(title, text, color) {
            const modal = document.getElementById('statusModal'), icon = document.getElementById('modalIcon');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            icon.className = "w-20 h-20 bg-red-50 text-red-500 rounded-3xl flex items-center justify-center mx-auto mb-6";
            icon.innerHTML = '<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-width="2"></path></svg>';
            modal.classList.remove('hidden');
        }
        function closeModal() { document.getElementById('statusModal').classList.add('hidden'); nimInput.focus(); }
    </script>
</body>
</html>
