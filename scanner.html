<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Terminal - UMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; -webkit-user-select: none; }
        .umm-gradient { background: linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%); }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Modal Notifikasi -->
    <div id="statusModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 modal-overlay">
        <div class="bg-white rounded-[2.5rem] shadow-2xl max-w-sm w-full p-10 text-center animate__animated animate__zoomIn">
            <div id="modalIcon" class="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 bg-red-50 text-red-500">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-width="2"></path></svg>
            </div>
            <h3 id="modalTitle" class="text-xl font-black text-slate-800 mb-2 uppercase tracking-tighter">Status</h3>
            <p id="modalText" class="text-slate-500 text-sm leading-relaxed mb-8"></p>
            <button onclick="closeModal()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest">Tutup</button>
        </div>
    </div>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 h-20 flex items-center px-6 justify-between">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 umm-gradient rounded-xl flex items-center justify-center text-white font-black shadow-lg">UMM</div>
            <h1 class="font-extrabold text-slate-800 uppercase text-sm">Scanner Terminal</h1>
        </div>
        <div class="flex items-center gap-2 px-4 py-2 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase tracking-tighter">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span> Sistem Siap
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Input Area -->
        <div class="lg:col-span-4">
            <div class="bg-white rounded-[2.5rem] shadow-xl p-8 border border-slate-100 sticky top-28">
                <h2 class="text-center text-xl font-black text-slate-800 mb-6 uppercase tracking-tight">Pendaftaran</h2>
                <div class="relative">
                    <input type="text" id="nimInput" maxlength="15" oninput="this.value = this.value.replace(/[^0-9]/g, '')" autocomplete="off" class="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl text-center text-4xl font-black text-slate-700 focus:border-red-600 outline-none transition-all shadow-inner" placeholder="----">
                    <div id="scan-loading" class="hidden absolute right-6 top-1/2 -translate-y-1/2">
                        <div class="animate-spin rounded-full h-8 w-8 border-4 border-slate-200 border-b-red-600"></div>
                    </div>
                </div>
                <p class="text-center text-[10px] font-bold text-slate-400 mt-4 uppercase tracking-[0.2em]">Tempel KTM atau Input NIM</p>

                <!-- Feedback Area -->
                <div id="fast-feedback" class="hidden mt-8 text-center animate__animated animate__zoomIn">
                    <div id="fb-card" class="rounded-[2.5rem] p-8 shadow-2xl text-white mb-6">
                        <span id="fb-status" class="text-[10px] font-black uppercase tracking-widest block mb-2 opacity-80"></span>
                        <div id="fb-id" class="text-7xl font-black font-mono leading-none tracking-tighter mb-4">---</div>
                        <div class="text-[9px] font-bold px-5 py-2.5 bg-black/10 rounded-2xl inline-block italic uppercase tracking-tighter">Silakan Ke Meja Mesin</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Monitoring Area -->
        <div class="lg:col-span-8">
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden text-sm">
                <div class="p-8 bg-slate-900 text-white flex justify-between items-center">
                    <h2 class="text-lg font-bold uppercase tracking-tight">Monitor Antrean Real-Time</h2>
                    <span id="last-update" class="text-[9px] font-bold opacity-50 uppercase tracking-widest">Update: --:--</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b">
                            <tr>
                                <th class="px-8 py-6 text-center">ID Finger</th>
                                <th class="px-8 py-6">NIM Mahasiswa</th>
                                <th class="px-8 py-6">Waktu</th>
                                <th class="px-8 py-6 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100 text-slate-700">
                            <!-- Data dimuat via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxiuQXcJvrw9vE2FutImOIP6ysmsOsDK5O3zko_wBDtQfp7OPCI9OzF45o1lriW4WfRPA/exec"; // Ganti dengan URL asli Anda

        // Keamanan: Blokir Klik Kanan & F12
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 67, 74].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false; };

        const nimInput = document.getElementById('nimInput');
        
        window.onload = () => { 
            nimInput.focus(); 
            refreshData(); 
            setInterval(refreshData, 5000); 
        };

        // Fokus otomatis jika tidak sengaja klik area lain
        document.addEventListener('click', () => { if(!nimInput.disabled) nimInput.focus(); });

        async function refreshData() {
            try {
                const res = await fetch(`${API_URL}?action=list`);
                const data = await res.json();
                const regs = data.registrations || data;
                
                document.getElementById('last-update').innerText = "Update: " + new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

                document.getElementById('tableBody').innerHTML = regs.map(item => `
                    <tr class="hover:bg-slate-50 transition-all">
                        <td class="px-8 py-6 text-center">
                            <span class="bg-slate-900 text-white px-5 py-2 rounded-2xl font-mono font-black text-xl shadow-lg">${item.id}</span>
                        </td>
                        <td class="px-8 py-6">
                            <div class="font-black text-slate-800 text-lg">${item.nim}</div>
                            <div class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">${item.nama || 'Mahasiswa'}</div>
                        </td>
                        <td class="px-8 py-6 text-slate-400 font-bold text-[10px] uppercase">${item.time}</td>
                        <td class="px-8 py-6 text-center">
                            <span class="px-4 py-2 rounded-xl text-[10px] font-black uppercase border ${item.isVerified ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-slate-100 text-slate-400 border-slate-200'}">
                                ${item.isVerified ? '✓ Selesai' : '⌛ Antre'}
                            </span>
                        </td>
                    </tr>`).join('');
            } catch(e) {}
        }

        nimInput.onkeydown = async (e) => {
            if(e.key === 'Enter') {
                const nim = nimInput.value.trim();
                if(nim.length !== 15) {
                    showModal("NIM Tidak Valid", "NIM harus berjumlah tepat 15 digit angka.");
                    return;
                }

                nimInput.disabled = true;
                document.getElementById('scan-loading').classList.remove('hidden');

                try {
                    const res = await fetch(`${API_URL}?action=scan&nim=${nim}`);
                    const data = await res.json();
                    
                    document.getElementById('scan-loading').classList.add('hidden');

                    if(data.error) {
                        showModal("Ditolak", data.error);
                        resetScanner();
                    } else {
                        handleScanSuccess(data);
                    }
                } catch(e) {
                    showModal("Koneksi Error", "Gagal menghubungi server.");
                    resetScanner();
                }
            }
        };

        function handleScanSuccess(data) {
            const feedback = document.getElementById('fast-feedback');
            document.getElementById('fb-id').innerText = data.idFinger;
            document.getElementById('fb-status').innerText = data.exists ? "DATA TERDAFTAR" : "REGISTRASI BERHASIL";
            document.getElementById('fb-card').className = `rounded-[2.5rem] p-8 shadow-2xl text-white ${data.exists ? 'bg-amber-500' : 'bg-emerald-600'}`;
            
            feedback.classList.remove('hidden');
            setTimeout(resetScanner, 4000);
            refreshData();
        }

        function resetScanner() {
            nimInput.value = ''; 
            nimInput.disabled = false;
            document.getElementById('fast-feedback').classList.add('hidden');
            nimInput.focus();
        }

        function showModal(t, m) {
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('modalText').innerText = m;
            document.getElementById('statusModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('statusModal').classList.add('hidden');
            nimInput.focus();
        }
    </script>
</body>
</html>
